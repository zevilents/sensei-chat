<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HikariTutor - Master Quiz Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script src="https://elfsightcdn.com/platform.js" async></script>

    <style>
        :root {
            --sky: #7ed6df; --deep: #22a6b3; --sun: #f9ca24;
            --cloud: rgba(255, 255, 255, 0.98); --dark: #130f40;
            --success: #2ecc71; --error: #eb4d4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #7ed6df 0%, #e0fcff 100%);
            margin: 0; display: flex; justify-content: center;
            height: 100dvh; overflow: hidden;
        }

        .sakura-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: #ffdae0; border-radius: 150% 0 150% 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .app {
            width: 100%; max-width: 500px; display: flex; flex-direction: column;
            z-index: 2; background: var(--cloud); backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.1); height: 100%; position: relative;
        }

        header {
            padding: 10px 15px; background: white; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 4px solid var(--sun); flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 35px; height: 35px; background: var(--sky); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; border: 2px solid white; }

        .nav-buttons { display: flex; gap: 5px; }
        .nav-btn {
            background: var(--sun); color: white; border: none; padding: 6px 10px;
            border-radius: 15px; font-weight: bold; font-family: 'Fredoka One'; font-size: 0.7rem;
            cursor: pointer; box-shadow: 0 3px 0 #d35400;
        }
        .nav-btn.quiz { background: var(--deep); box-shadow: 0 3px 0 #1a7d8b; }
        .nav-btn:active { transform: translateY(2px); box-shadow: none; }

        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* RUBY STYLE */
        ruby { ruby-position: over; ruby-align: center; }
        rt { font-size: 0.65rem; color: var(--deep); font-weight: 700; font-family: 'Poppins', sans-serif; padding-bottom: 1px; }

        .bubble {
            max-width: 88%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem;
            line-height: 2.3 !important; animation: pop 0.3s ease; box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .sensei { align-self: flex-start; background: white; border: 1px solid #eee; }
        .user { align-self: flex-end; background: var(--sky); color: white; }

        /* --- MODAL STYLE --- */
        .full-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100; display: none; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 15px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 15px; }

        /* --- INPUT --- */
        .input-bar { padding: 15px; background: white; border-top: 1px solid #eee; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .input-group { background: #f1f2f6; border-radius: 30px; display: flex; align-items: center; border: 2px solid var(--sky); padding: 5px; }
        input { flex: 1; border: none; padding: 10px 15px; outline: none; font-size: 1rem; background: transparent; }
        button#sendBtn { background: var(--sun); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* --- KANA GRID --- */
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .card { background: #f8f9fa; border: 1px solid #eee; border-radius: 8px; padding: 8px 2px; text-align: center; }
        .c-jp { font-size: 1.1rem; font-weight: bold; color: var(--dark); }
        .c-ro { font-size: 0.6rem; color: var(--deep); font-weight: bold; }
        .section-title { font-family: 'Fredoka One'; color: var(--deep); margin: 15px 0 5px; border-bottom: 2px dashed var(--sky); }

        #loading { align-self: flex-start; background: white; padding: 8px 15px; border-radius: 15px; display: none; align-items: center; gap: 10px; border: 2px solid var(--sun); margin-bottom: 5px; }
        .shuriken { width: 20px; height: 20px; background: var(--sun); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: spin 0.8s linear infinite; }

        /* HIDE ELFSIGHT WIDGET BUT KEEP IT RUNNING */
        .elfsight-app-c7fb5b15-6956-4f7e-93e7-7f6bd801fb5e {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="sakura-bg" id="sakura"></div>

<div class="app">
    <div class="elfsight-app-c7fb5b15-6956-4f7e-93e7-7f6bd801fb5e" data-elfsight-app-lazy></div>

    <header>
        <div class="header-left">
            <div class="avatar">🏯</div>
            <div>
                <h1 style="font-family:'Fredoka One'; font-size:0.9rem; margin:0; color:var(--deep);">HIKARI TUTOR</h1>
                <p style="color:#27ae60; font-size:0.6rem; margin:0; font-weight:bold;">● Active</p>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="toggleModal('kanaModal')">📑 TABEL</button>
            <button class="nav-btn quiz" onclick="toggleModal('quizModal')">🎯 LATIHAN</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="bubble sensei">Ohayou! ☀️ Belajar jadi makin asyik dengan musik lofi yang tersembunyi. Mari kita bedah kalimat Jepang ya! 🎶</div>
    </div>

    <div id="loading"><div class="shuriken"></div><span style="font-size:0.8rem; font-weight:bold; color:var(--deep);">Thinking...</span></div>

    <div class="input-bar">
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Tanya Sensei..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">⚡</button>
        </div>
    </div>

    <div id="kanaModal" class="full-modal">
        <div class="modal-header">
            <div style="display:flex; gap:10px;">
                <button class="nav-btn" onclick="renderKana('hira')">あ HIRA</button>
                <button class="nav-btn" onclick="renderKana('kata')">ア KATA</button>
            </div>
            <button onclick="toggleModal('kanaModal')" style="background:none; border:none; font-size:1.5rem;">✕</button>
        </div>
        <div class="modal-body" id="kanaContent"></div>
    </div>

    <div id="quizModal" class="full-modal">
        <div class="modal-header">
            <span style="font-family:'Fredoka One'; color:var(--deep);">KANA QUIZ</span>
            <button onclick="toggleModal('quizModal')" style="background:none; border:none; font-size:1.5rem;">✕</button>
        </div>
        <div class="modal-body">
            <div id="quizSetup" class="quiz-container">
                <h3>Pilih Mode Latihan:</h3>
                <div style="display:flex; gap:15px;">
                    <button class="nav-btn" style="padding:15px 25px;" onclick="startQuiz('hira')">あ HIRAGANA</button>
                    <button class="nav-btn quiz" style="padding:15px 25px;" onclick="startQuiz('kata')">ア KATAKANA</button>
                </div>
            </div>
            <div id="quizGame" class="quiz-container" style="display:none;">
                <div class="score-badge">SCORE: <span id="scoreVal">0</span></div>
                <div class="question-box" id="qChar">あ</div>
                <div class="options-grid" id="options"></div>
                <button class="nav-btn" style="margin-top:20px; display:none;" id="nextBtn" onclick="nextQuestion()">SOAL BERIKUTNYA ➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    // DATA KANA & LOGIC RENDER (Disingkat untuk menghemat ruang, tetap fungsional)
    const KANA_DATA = {
        hira: [['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho'],['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo'],['や','ya'],['ゆ','yu'],['よ','yo'],['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro'],['わ','wa'],['を','wo'],['ん','n']],
        kata: [['ア','a'],['イ','i'],['ウ','u'],['エ','e'],['オ','o'],['カ','ka'],['キ','ki'],['ク','ku'],['ケ','ke'],['コ','ko'],['サ','sa'],['シ','shi'],['ス','su'],['セ','se'],['ソ','so'],['タ','ta'],['チ','chi'],['ツ','tsu'],['テ','te'],['ト','to'],['ナ','na'],['ニ','ni'],['ヌ','nu'],['ネ','ne'],['ノ','no'],['ハ','ha'],['ヒ','hi'],['フ','fu'],['ヘ','he'],['ホ','ho'],['マ','ma'],['ミ','mi'],['む','mu'],['メ','me'],['モ','mo'],['ヤ','ya'],['ユ','yu'],['ヨ','yo'],['ラ','ra'],['リ','ri'],['ル','ru'],['レ','re'],['ロ','ro'],['ワ','wa'],['ヲ','wo'],['ン','n']]
    };

    function toggleModal(id) {
        const m = document.getElementById(id);
        const isShow = m.style.display === 'flex';
        m.style.display = isShow ? 'none' : 'flex';
        if(!isShow && id === 'kanaModal') renderKana('hira');
        if(isShow && id === 'quizModal') resetQuiz();
    }

    function renderKana(type) {
        let html = `<div class="section-title">${type.toUpperCase()}</div><div class="grid-5">`;
        KANA_DATA[type].forEach(i => html += `<div class="card"><div class="c-jp">${i[0]}</div><div class="c-ro">${i[1]}</div></div>`);
        document.getElementById('kanaContent').innerHTML = html + `</div>`;
    }

    // QUIZ LOGIC
    let score = 0, currentMode = '', correctAnswer = '';
    function resetQuiz() { score = 0; document.getElementById('scoreVal').innerText = '0'; document.getElementById('quizSetup').style.display = 'flex'; document.getElementById('quizGame').style.display = 'none'; }
    function startQuiz(mode) { currentMode = mode; document.getElementById('quizSetup').style.display = 'none'; document.getElementById('quizGame').style.display = 'flex'; nextQuestion(); }
    function nextQuestion() {
        document.getElementById('nextBtn').style.display = 'none';
        const data = KANA_DATA[currentMode];
        const q = data[Math.floor(Math.random() * data.length)];
        correctAnswer = q[1];
        document.getElementById('qChar').innerText = q[0];
        let choices = [q[1]];
        while(choices.length < 4) {
            let rand = data[Math.floor(Math.random() * data.length)][1];
            if(!choices.includes(rand)) choices.push(rand);
        }
        document.getElementById('options').innerHTML = choices.sort(() => Math.random() - 0.5).map(c => `<button class="opt-btn" onclick="checkAns(this, '${c}')">${c}</button>`).join('');
    }
    function checkAns(btn, ans) {
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        if(ans === correctAnswer) { btn.classList.add('correct'); score += 10; document.getElementById('scoreVal').innerText = score; }
        else { btn.classList.add('wrong'); document.querySelectorAll('.opt-btn').forEach(b => { if(b.innerText === correctAnswer) b.classList.add('correct'); }); }
        document.getElementById('nextBtn').style.display = 'block';
    }

    // Chat & Sakura
    async function sendMessage() {
        const input = document.getElementById('userInput'), chat = document.getElementById('chat-window'), load = document.getElementById('loading');
        const text = input.value.trim(); if(!text) return;
        chat.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = ''; chat.appendChild(load); load.style.display = 'flex'; chat.scrollTop = chat.scrollHeight;
        try {
            const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: text }) });
            const data = await res.json();
            const ruby = data.reply.replace(/(\S+)\[([^\]]+)\]/g, '<ruby>$1<rt>$2</rt></ruby>');
            load.style.display = 'none';
            chat.innerHTML += `<div class="bubble sensei">${marked.parse(ruby)}</div>`;
        } catch (e) { load.style.display = 'none'; chat.innerHTML += `<div class="bubble sensei">Error! 🌸</div>`; }
        chat.scrollTop = chat.scrollHeight;
    }

    const s = document.getElementById('sakura');
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div'); p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw'; p.style.width = p.style.height = Math.random() * 8 + 6 + 'px';
        p.style.animationDuration = Math.random() * 3 + 4 + 's'; p.style.animationDelay = Math.random() * 5 + 's';
        s.appendChild(p);
    }
</script>

</body>
</html>
