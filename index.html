<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HikariTutor - Classic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sky: #7ed6df; --deep: #22a6b3; --sun: #f9ca24;
            --cloud: rgba(255, 255, 255, 0.98); --dark: #130f40;
            --success: #2ecc71; --error: #eb4d4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #7ed6df 0%, #e0fcff 100%);
            margin: 0; display: flex; justify-content: center;
            height: 100dvh; overflow: hidden;
        }

        /* Sakura Animation */
        .sakura-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: #ffdae0; border-radius: 150% 0 150% 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .app {
            width: 100%; max-width: 500px; display: flex; flex-direction: column;
            z-index: 2; background: var(--cloud); backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.1); height: 100%; position: relative;
        }

        header {
            padding: 12px 15px; background: white; border-bottom: 4px solid var(--sun); flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 38px; height: 38px; background: var(--sky); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; border: 2px solid white; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }

        .nav-group { display: flex; gap: 8px; }
        .nav-btn {
            background: var(--sun); color: white; border: none; padding: 7px 12px;
            border-radius: 15px; font-weight: bold; font-family: 'Fredoka One'; font-size: 0.7rem;
            cursor: pointer; box-shadow: 0 3px 0 #d35400; transition: 0.2s;
        }
        .nav-btn.quiz { background: var(--deep); box-shadow: 0 3px 0 #1a7d8b; }
        .nav-btn:active { transform: translateY(2px); box-shadow: none; }

        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* RUBY STYLE (Romaji di atas) */
        ruby { ruby-position: over; ruby-align: center; }
        rt { font-size: 0.65rem; color: var(--deep); font-weight: 700; font-family: 'Poppins', sans-serif; padding-bottom: 1px; }

        .bubble {
            max-width: 88%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem;
            line-height: 2.3 !important; animation: pop 0.3s ease; box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .sensei { align-self: flex-start; background: white; border: 1px solid #eee; border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: var(--sky); color: white; border-bottom-right-radius: 2px; font-weight: 500; }

        /* --- MODAL TABEL KANA --- */
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100; display: none; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 15px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 15px; }

        .section-title { font-family: 'Fredoka One'; color: var(--deep); margin: 15px 0 8px; border-bottom: 2px dashed var(--sky); font-size: 0.9rem; }
        .grid-kana { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .grid-youon { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .card { background: #f8f9fa; border: 1px solid #eee; border-radius: 8px; padding: 8px 2px; text-align: center; }
        .c-jp { font-size: 1.2rem; font-weight: bold; color: var(--dark); }
        .c-ro { font-size: 0.65rem; color: var(--deep); font-weight: bold; text-transform: uppercase; }

        /* --- INPUT --- */
        .input-bar { padding: 15px; background: white; border-top: 1px solid #eee; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .input-group { background: #f1f2f6; border-radius: 30px; display: flex; align-items: center; border: 2px solid var(--sky); padding: 5px; }
        input { flex: 1; border: none; padding: 10px 15px; outline: none; font-size: 1rem; background: transparent; font-family: inherit; }
        button#sendBtn { background: var(--sun); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        #loading { align-self: flex-start; background: white; padding: 8px 15px; border-radius: 15px; display: none; align-items: center; gap: 10px; border: 2px solid var(--sun); margin-bottom: 5px; }
        .shuriken { width: 20px; height: 20px; background: var(--sun); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="sakura-bg" id="sakura"></div>

<div class="app">
    <header>
        <div class="header-left">
            <div class="avatar">🏯</div>
            <div>
                <h1 style="font-family:'Fredoka One'; font-size:1rem; margin:0; color:var(--deep);">HIKARI TUTOR</h1>
                <p style="color:#27ae60; font-size:0.65rem; margin:0; font-weight:bold;">● Sensei Online</p>
            </div>
        </div>
        <div class="nav-group">
            <button class="nav-btn" onclick="toggleModal('kanaModal')">📑 KANA</button>
            <button class="nav-btn quiz" onclick="toggleModal('quizModal')">🎯 KUIS</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="bubble sensei">Ohayou! ☀️ Sensei sudah merapikan aplikasi. Klik **📑 KANA** untuk tabel lengkap atau kita bisa lanjut ngobrol!</div>
    </div>

    <div id="loading"><div class="shuriken"></div><span style="font-size:0.8rem; font-weight:bold; color:var(--deep);">Thinking...</span></div>

    <div class="input-bar">
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Tanya sesuatu..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">⚡</button>
        </div>
    </div>

    <div id="kanaModal" class="modal">
        <div class="modal-header">
            <div style="display:flex; gap:10px;">
                <button class="nav-btn" onclick="renderKana('hira')">あ HIRAGANA</button>
                <button class="nav-btn" onclick="renderKana('kata')">ア KATAKANA</button>
            </div>
            <button onclick="toggleModal('kanaModal')" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
        </div>
        <div class="modal-body" id="kanaContent">
            </div>
    </div>

    <div id="quizModal" class="modal">
        <div class="modal-header">
            <span style="font-family:'Fredoka One'; color:var(--deep);">KANA QUIZ</span>
            <button onclick="toggleModal('quizModal')" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
        </div>
        <div class="modal-body">
            <p style="text-align:center;">Fitur Kuis sedang aktif! Silakan pilih mode latihan di chat atau tutup untuk lanjut.</p>
        </div>
    </div>
</div>

<script>
    // DATA KANA LENGKAP
    const KANA_DATA = {
        hira: {
            seion: [['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho'],['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo'],['や','ya'],['',''],['ゆ','yu'],['',''],['よ','yo'],['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro'],['わ','wa'],['',''],['を','wo'],['',''],['ん','n']],
            dakuon: [['が','ga'],['ぎ','gi'],['ぐ','gu'],['げ','ge'],['ご','go'],['ざ','za'],['じ','ji'],['ず','zu'],['ぜ','ze'],['ぞ','zo'],['だ','da'],['ぢ','ji'],['づ','zu'],['det','de'],['ど','do'],['ば','ba'],['び','bi'],['ぶ','bu'],['べ','be'],['ぼ','bo'],['ぱ','pa'],['ぴ','pi'],['ぷ','pu'],['ぺ','pe'],['ぽ','po']],
            youon: [['きゃ','kya'],['きゅ','kyu'],['きょ','kyo'],['しゃ','sha'],['しゅ','shu'],['しょ','sho'],['ちゃ','cha'],['ちゅ','chu'],['ちょ','cho']]
        },
        kata: {
            seion: [['ア','a'],['イ','i'],['ウ','u'],['エ','e'],['オ','o'],['カ','ka'],['キ','ki'],['ク','ku'],['ケ','ke'],['コ','ko'],['サ','sa'],['シ','shi'],['ス','su'],['セ','se'],['ソ','so'],['タ','ta'],['チ','chi'],['ツ','tsu'],['テ','te'],['ト','to'],['ナ','na'],['ニ','ni'],['ヌ','nu'],['ネ','ne'],['ノ','no'],['ハ','ha'],['ヒ','hi'],['フ','fu'],['ヘ','he'],['ホ','ho'],['マ','ma'],['ミ','mi'],['ム','mu'],['メ','me'],['モ','mo'],['ヤ','ya'],['',''],['ユ','yu'],['',''],['ヨ','yo'],['ラ','ra'],['リ','ri'],['ル','ru'],['レ','re'],['ロ','ro'],['ワ','wa'],['',''],['ヲ','wo'],['',''],['ン','n']],
            dakuon: [['ガ','ga'],['ギ','gi'],['グ','gu'],['ゲ','ge'],['ゴ','go'],['ザ','za'],['ジ','ji'],['ズ','zu'],['ゼ','ze'],['ゾ','zo'],['ダ','da'],['ヂ','ji'],['ヅ','zu'],['デ','de'],['ド','do'],['バ','ba'],['ビ','bi'],['ブ','bu'],['ベ','be'],['ボ','bo'],['パ','pa'],['ピ','pi'],['プ','pu'],['ペ','pe'],['ポ','po']],
            youon: [['キャ','kya'],['キュ','kyu'],['キョ','kyo'],['シャ','sha'],['シュ','shu'],['ショ','sho'],['チャ','cha'],['チュ','chu'],['チョ','cho']]
        }
    };

    function toggleModal(id) {
        const m = document.getElementById(id);
        const isShow = m.style.display === 'flex';
        m.style.display = isShow ? 'none' : 'flex';
        if(!isShow && id === 'kanaModal') renderKana('hira');
    }

    function renderKana(type) {
        const container = document.getElementById('kanaContent');
        const data = KANA_DATA[type];
        
        let html = `
            <div class="section-title">SEION (Dasar)</div>
            <div class="grid-kana">${data.seion.map(i => `<div class="card"><span class="c-jp">${i[0]}</span><span class="c-ro">${i[1]}</span></div>`).join('')}</div>
            
            <div class="section-title">DAKUON & HANDAKUON</div>
            <div class="grid-kana">${data.dakuon.map(i => `<div class="card"><span class="c-jp">${i[0]}</span><span class="c-ro">${i[1]}</span></div>`).join('')}</div>
            
            <div class="section-title">YOUON (Kombinasi)</div>
            <div class="grid-youon">${data.youon.map(i => `<div class="card"><span class="c-jp">${i[0]}</span><span class="c-ro">${i[1]}</span></div>`).join('')}</div>
        `;
        container.innerHTML = html;
        container.scrollTop = 0;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const load = document.getElementById('loading');
        const text = input.value.trim();
        if(!text) return;

        chat.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = '';
        chat.appendChild(load);
        load.style.display = 'flex';
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            // Mengubah format Kanji[romaji] menjadi tag Ruby
            const rubyText = data.reply.replace(/(\S+)\[([^\]]+)\]/g, '<ruby>$1<rt>$2</rt></ruby>');
            
            load.style.display = 'none';
            chat.innerHTML += `<div class="bubble sensei">${marked.parse(rubyText)}</div>`;
        } catch (e) {
            load.style.display = 'none';
            chat.innerHTML += `<div class="bubble sensei">Gomen, koneksi terputus! 🌸</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }

    // Sakura Animation
    const sakura = document.getElementById('sakura');
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = Math.random() * 8 + 6 + 'px';
        p.style.animationDuration = Math.random() * 3 + 4 + 's';
        p.style.animationDelay = Math.random() * 5 + 's';
        sakura.appendChild(p);
    }
</script>

</body>
</html>
