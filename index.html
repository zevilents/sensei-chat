<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HikariTutor - Summer Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sky: #7ed6df; --deep: #22a6b3; --sun: #f9ca24;
            --cloud: rgba(255, 255, 255, 0.96); --dark: #130f40;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #7ed6df 0%, #e0fcff 100%);
            margin: 0; display: flex; justify-content: center;
            height: 100dvh; overflow: hidden;
        }

        /* Sakura Animation */
        .sakura-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: #ffdae0; border-radius: 150% 0 150% 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .app {
            width: 100%; max-width: 500px; display: flex; flex-direction: column;
            z-index: 2; background: var(--cloud); backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.1); height: 100%;
        }

        header {
            padding: 15px 20px; background: white; display: flex; align-items: center; gap: 12px;
            border-bottom: 4px solid var(--sun); flex-shrink: 0;
        }

        .avatar { width: 45px; height: 45px; background: var(--sky); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* RUBY STYLE (Romaji di Atas) */
        ruby { ruby-position: over; ruby-align: center; }
        rt { font-size: 0.65rem; color: var(--deep); font-weight: 700; font-family: 'Poppins', sans-serif; padding-bottom: 1px; }

        .bubble {
            max-width: 88%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem;
            line-height: 2.2 !important; /* Memberi ruang untuk teks di atas */
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }
        @keyframes pop { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .sensei { align-self: flex-start; background: white; color: var(--dark); border-bottom-left-radius: 2px; border: 1px solid #eee; }
        .user { align-self: flex-end; background: var(--sky); color: white; border-bottom-right-radius: 2px; font-weight: 500; }

        .bubble h3 { color: var(--deep); margin: 10px 0 5px; font-size: 1.1rem; font-family: 'Fredoka One'; border-left: 4px solid var(--sun); padding-left: 10px; }

        /* Loading */
        #loading { align-self: flex-start; background: white; padding: 10px 15px; border-radius: 15px; display: none; align-items: center; gap: 10px; border: 2px solid var(--sun); margin-bottom: 10px; }
        .shuriken { width: 25px; height: 25px; background: var(--sun); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .input-bar { padding: 15px; background: white; border-top: 1px solid #eee; flex-shrink: 0; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .input-group { background: #f1f2f6; border-radius: 30px; display: flex; align-items: center; border: 2px solid var(--sky); padding: 5px; }
        input { flex: 1; border: none; padding: 10px 15px; outline: none; font-size: 1rem; background: transparent; }
        button { background: var(--sun); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="sakura-bg" id="sakura"></div>

<div class="app">
    <header>
        <div class="avatar">🏯</div>
        <div>
            <h1 style="font-family:'Fredoka One'; font-size:1.2rem; margin:0; color:var(--deep);">HIKARI TUTOR</h1>
            <p style="color:#27ae60; font-size:0.75rem; margin:0; font-weight:bold;">● Sensei is Ready!</p>
        </div>
    </header>

    <div id="chat-window">
        <div class="bubble sensei">Ohayou! ☀️ Saya **Hikari Sensei**. Ada kata atau kalimat Jepang yang ingin kamu pelajari?</div>
    </div>

    <div id="loading">
        <div class="shuriken"></div>
        <span style="font-size:0.85rem; font-weight:bold; color:var(--deep);">Sensei is thinking...</span>
    </div>

    <div class="input-bar">
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Tanya Sensei..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">⚡</button>
        </div>
    </div>
</div>

<script>
    // Sakura petals
    const sakura = document.getElementById('sakura');
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = Math.random() * 8 + 6 + 'px';
        p.style.animationDuration = Math.random() * 3 + 4 + 's';
        p.style.animationDelay = Math.random() * 5 + 's';
        sakura.appendChild(p);
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const load = document.getElementById('loading');
        const text = input.value.trim();
        if(!text) return;

        chat.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = '';
        chat.appendChild(load);
        load.style.display = 'flex';
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            
            // MAGIC: Ganti format [romaji] menjadi tag Ruby
            const rubyConverted = data.reply.replace(/(\S+)\[([^\]]+)\]/g, '<ruby>$1<rt>$2</rt></ruby>');
            
            load.style.display = 'none';
            chat.innerHTML += `<div class="bubble sensei">${marked.parse(rubyConverted)}</div>`;
        } catch (e) {
            load.style.display = 'none';
            chat.innerHTML += `<div class="bubble sensei">Gomen, koneksi terputus! 🌸</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
