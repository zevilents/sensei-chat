<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HikariTutor - Telegram Style</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script src="https://elfsightcdn.com/platform.js" async></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            /* Menggunakan font bawaan sistem seperti Apple/Android */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e4e5e0; /* Warna abu-abu background Telegram */
            margin: 0; 
            display: flex; 
            justify-content: center;
            height: 100dvh; 
            overflow: hidden;
            color: #000;
        }

        .app {
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            flex-direction: column;
            background: #9fbcd3; /* Warna biru-abu khas background chat Telegram */
            position: relative;
        }

        /* --- HEADER --- */
        header {
            background: #ffffff;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
            z-index: 10;
        }

        .avatar {
            width: 42px; 
            height: 42px; 
            background: #3390ec; /* Warna biru Telegram */
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white;
            font-size: 1.2rem; 
            margin-right: 12px;
        }

        .info { display: flex; flex-direction: column; }
        .info h1 { margin: 0; font-size: 16px; font-weight: 600; color: #000; }
        .info p { margin: 0; font-size: 13px; color: #3390ec; margin-top: 2px; }

        /* --- CHAT AREA --- */
        #chat-window {
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; /* Jarak antar pesan sangat rapat */
        }

        .bubble {
            max-width: 82%; 
            padding: 6px 10px 8px 12px; 
            font-size: 15px; 
            line-height: 1.4; 
            position: relative; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.1); 
            word-wrap: break-word;
        }

        /* Styling spesifik untuk Markdown di dalam bubble agar tidak berantakan */
        .bubble p { margin: 0 0 5px 0; }
        .bubble p:last-child { margin: 0; }
        .bubble strong { font-weight: 600; }

        .sensei {
            align-self: flex-start; 
            background: #ffffff; 
            color: #000; 
            border-radius: 12px 12px 12px 4px; /* Sudut lancip di kiri bawah */
        }

        .user {
            align-self: flex-end; 
            background: #effdde; /* Warna hijau muda khas pesan terkirim Telegram/WA */
            color: #000; 
            border-radius: 12px 12px 4px 12px; /* Sudut lancip di kanan bawah */
        }

        .time {
            font-size: 11px; 
            color: #a1aab3; 
            float: right; 
            margin: 6px -2px -4px 12px; /* Posisi jam di pojok kanan bawah */
        }

        .user .time { color: #68bc70; } /* Warna jam agak hijau untuk pesan user */

        /* --- INPUT AREA --- */
        .input-bar {
            background: #ffffff; 
            padding: 8px 12px; 
            display: flex; 
            align-items: flex-end; 
            gap: 10px; 
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        input {
            flex: 1; 
            background: #ffffff; 
            border: none; 
            padding: 10px 0; 
            font-size: 15px; 
            outline: none; 
            font-family: inherit;
        }

        .input-wrapper {
            flex: 1;
            background: #f4f4f5;
            border-radius: 20px;
            padding: 0 15px;
            display: flex;
            align-items: center;
        }

        button#sendBtn {
            background: #3390ec; 
            color: white; 
            border: none; 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1rem;
            flex-shrink: 0;
            margin-bottom: 2px;
            transition: transform 0.1s;
        }

        button#sendBtn:active { transform: scale(0.95); }

        /* Loader simpel mirip "typing..." */
        #loading {
            align-self: flex-start; 
            background: transparent; 
            padding: 5px 12px; 
            display: none; 
            font-size: 13px; 
            color: #3390ec;
            font-weight: 500;
        }

        /* HIDDEN MUSIC */
        .elfsight-app-c7fb5b15-6956-4f7e-93e7-7f6bd801fb5e { display: none !important; }
    </style>
</head>
<body>

<div class="elfsight-app-c7fb5b15-6956-4f7e-93e7-7f6bd801fb5e" data-elfsight-app-lazy></div>

<div class="app">
    <header>
        <div class="avatar">🏯</div>
        <div class="info">
            <h1>Hikari Sensei</h1>
            <p>online</p>
        </div>
    </header>

    <div id="chat-window">
        <div class="bubble sensei">
            <p>Ohayou! Saya Hikari Sensei. Mari kita belajar bahasa Jepang bersama.</p>
            <span class="time" id="initTime"></span>
        </div>
    </div>

    <div id="loading">typing...</div>

    <div class="input-bar">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Message" autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
        <button id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    // Set waktu untuk pesan pertama
    document.getElementById('initTime').innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

    function getTime() {
        return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const load = document.getElementById('loading');
        const text = input.value.trim(); 
        
        if(!text) return;

        // Render Pesan User
        chat.innerHTML += `
            <div class="bubble user">
                <p>${text}</p>
                <span class="time">${getTime()}</span>
            </div>
        `;
        
        input.value = ''; 
        chat.appendChild(load); // Pindahkan loader ke paling bawah
        load.style.display = 'block'; 
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch("/api/chat", { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ message: text }) 
            });
            const data = await res.json();
            
            load.style.display = 'none';
            
            // Render Pesan Sensei
            chat.innerHTML += `
                <div class="bubble sensei">
                    ${marked.parse(data.reply)}
                    <span class="time">${getTime()}</span>
                </div>
            `;
        } catch (e) { 
            load.style.display = 'none'; 
            chat.innerHTML += `
                <div class="bubble sensei">
                    <p>Pesan tidak terkirim. Coba lagi.</p>
                    <span class="time">${getTime()}</span>
                </div>
            `; 
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
