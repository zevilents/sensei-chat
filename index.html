<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HikariTutor - Sensei Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #ff4757; --dark: #1e272e; --bubble-sensei: #2f3542; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .chat-box { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: #2f3542; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        header { background: var(--primary); padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.6; }
        .bubble h3 { color: #fffa65; font-size: 1rem; margin: 10px 0 5px 0; }
        .user { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 2px; }
        .sensei { align-self: flex-start; background: #57606f; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 15px; background: #2f3542; border-top: 1px solid #57606f; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #1e272e; color: white; outline: none; }
        button { margin-left: 10px; padding: 10px 20px; border-radius: 25px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-box">
        <header>🌸 HIKARITUTOR SENSEI</header>
        <div id="chat-window">
            <div class="bubble sensei">こんにちは！ (Konnichiwa!) Ada kalimat Bahasa Jepang yang ingin kamu pelajari hari ini?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ketik kalimat di sini..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Kirim</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatWindow = document.getElementById('chat-window');
            const text = input.value.trim();
            if (!text) return;

            chatWindow.innerHTML += `<div class="bubble user">${text}</div>`;
            input.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // Fetch ke API internal Render
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                const formatted = marked.parse(data.reply);
                chatWindow.innerHTML += `<div class="bubble sensei">${formatted}</div>`;
            } catch (e) {
                chatWindow.innerHTML += `<div class="bubble sensei" style="color: #ff4757;">Aduh, server sedang istirahat. Coba lagi ya!</div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
