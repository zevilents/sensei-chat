<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HikariTutor - Sensei Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sky: #7ed6df; --deep: #22a6b3; --sun: #f9ca24;
            --cloud: rgba(255, 255, 255, 0.98); --dark: #130f40;
            --success: #2ecc71; --error: #eb4d4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #7ed6df 0%, #e0fcff 100%);
            margin: 0; display: flex; justify-content: center;
            height: 100dvh; overflow: hidden;
        }

        .sakura-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: #ffdae0; border-radius: 150% 0 150% 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .app {
            width: 100%; max-width: 500px; display: flex; flex-direction: column;
            z-index: 2; background: var(--cloud); backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.1); height: 100%; position: relative;
        }

        header {
            padding: 10px 15px; background: white; border-bottom: 4px solid var(--sun); flex-shrink: 0;
        }

        .nav-scroll { display: flex; gap: 6px; overflow-x: auto; padding-top: 8px; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-btn {
            background: var(--sun); color: white; border: none; padding: 6px 12px;
            border-radius: 15px; font-weight: bold; font-family: 'Fredoka One'; font-size: 0.65rem;
            cursor: pointer; white-space: nowrap; box-shadow: 0 3px 0 #d35400;
        }
        .nav-btn.alt { background: var(--deep); box-shadow: 0 3px 0 #1a7d8b; }
        .nav-btn:active { transform: translateY(2px); box-shadow: none; }

        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        ruby { ruby-position: over; ruby-align: center; }
        rt { font-size: 0.6rem; color: var(--deep); font-weight: 700; }

        .bubble { max-width: 88%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 2.3 !important; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
        .sensei { align-self: flex-start; background: white; border: 1px solid #eee; }
        .user { align-self: flex-end; background: var(--sky); color: white; }

        /* --- MODAL SYSTEM --- */
        .full-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: none; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 15px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 15px; text-align: center; }

        /* --- DRAWING AREA --- */
        .score-panel { display: flex; justify-content: space-around; background: #f1f2f6; padding: 10px; border-radius: 15px; margin-bottom: 15px; font-family: 'Fredoka One'; color: var(--deep); }
        .canvas-area { position: relative; width: 280px; height: 280px; background: white; border: 4px solid var(--sky); margin: 0 auto; border-radius: 10px; touch-action: none; overflow: hidden; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 5; background: transparent; }
        #trace-canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.1; }
        .canvas-tools { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }

        /* --- INPUT --- */
        .input-bar { padding: 15px; background: white; border-top: 1px solid #eee; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .input-group { background: #f1f2f6; border-radius: 30px; display: flex; align-items: center; border: 2px solid var(--sky); padding: 5px; }
        input#userInput { flex: 1; border: none; padding: 10px 15px; outline: none; background: transparent; }
        button#sendBtn { background: var(--sun); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        #loading { align-self: flex-start; background: white; padding: 8px 15px; border-radius: 15px; display: none; align-items: center; gap: 10px; border: 2px solid var(--sun); margin-bottom: 5px; }
        .shuriken { width: 20px; height: 20px; background: var(--sun); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="sakura-bg" id="sakura"></div>

<div class="app">
    <header>
        <div style="display:flex; align-items:center; justify-content:space-between;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="avatar">🏯</div>
                <h1 style="font-family:'Fredoka One'; font-size:0.9rem; margin:0; color:var(--deep);">HIKARI TUTOR</h1>
            </div>
            <p id="totalProgress" style="font-size:0.6rem; color:var(--deep); font-weight:bold;">Mastered: 0</p>
        </div>
        <div class="nav-scroll">
            <button class="nav-btn" onclick="toggleModal('kanaModal')">📑 KANA</button>
            <button class="nav-btn alt" onclick="toggleModal('quizModal')">🎯 KUIS</button>
            <button class="nav-btn" style="background:#e67e22;" onclick="toggleModal('drawModal')">✍️ TULIS</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="bubble sensei">Ohayou! ☀️ Coba fitur **✍️ TULIS** untuk menguji seberapa sempurna kamu menulis Kanji! Ganbatte!</div>
    </div>

    <div id="loading"><div class="shuriken"></div><span style="font-size:0.8rem; font-weight:bold; color:var(--deep);">Thinking...</span></div>

    <div class="input-bar">
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Tanya sesuatu..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">⚡</button>
        </div>
    </div>

    <div id="drawModal" class="full-modal">
        <div class="modal-header">
            <span style="font-family:'Fredoka One'; color:var(--deep);">SENSEI'S CANVAS</span>
            <button onclick="toggleModal('drawModal')" style="background:none; border:none; font-size:1.5rem;">✕</button>
        </div>
        <div class="modal-body">
            <div class="score-panel">
                <div>SKOR: <span id="currentScore">0</span>%</div>
                <div>HASIL: <span id="gradeText">-</span></div>
            </div>

            <div class="canvas-area">
                <canvas id="trace-canvas" width="280" height="280"></canvas>
                <canvas id="canvas" width="280" height="280"></canvas>
            </div>
            
            <p style="margin-top:10px; font-weight:bold; color:var(--deep);" id="targetCharText">Target: 私</p>

            <div class="canvas-tools">
                <button class="nav-btn" style="background:#eb4d4b;" onclick="clearCanvas()">🗑️ HAPUS</button>
                <button class="nav-btn alt" onclick="checkScore()">💯 CEK SKOR</button>
                <button class="nav-btn" style="background:#2ecc71;" onclick="randomizeTarget()">🎲 RANDOM</button>
            </div>
        </div>
    </div>

    <div id="kanaModal" class="full-modal"><div class="modal-header">KANA<button onclick="toggleModal('kanaModal')">✕</button></div></div>
    <div id="quizModal" class="full-modal"><div class="modal-header">QUIZ<button onclick="toggleModal('quizModal')">✕</button></div></div>
</div>

<script>
    // --- DRAWING & SCORING LOGIC ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tCanvas = document.getElementById('trace-canvas');
    const tCtx = tCanvas.getContext('2d');
    
    let drawing = false;
    let targetChar = '私';
    const kanjiList = ['私', '人', '日', '月', '火', '水', '木', '金', '土', '山', '川', '田', '学', '生', '先', '会', '社', '名', '本', '中'];

    function initCanvas() {
        ctx.strokeStyle = '#130f40';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const getXY = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const start = (e) => { drawing = true; const pos = getXY(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
        const move = (e) => { if(!drawing) return; const pos = getXY(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
        const end = () => { drawing = false; };

        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
        canvas.addEventListener('touchend', end);
        
        drawTrace();
        loadProgress();
    }

    function drawTrace() {
        tCtx.clearRect(0, 0, 280, 280);
        tCtx.fillStyle = "black";
        tCtx.font = "bold 200px 'Noto Sans JP'";
        tCtx.textAlign = "center";
        tCtx.textBaseline = "middle";
        tCtx.fillText(targetChar, 140, 145);
    }

    function randomizeTarget() {
        targetChar = kanjiList[Math.floor(Math.random() * kanjiList.length)];
        document.getElementById('targetCharText').innerText = `Target: ${targetChar}`;
        clearCanvas();
        drawTrace();
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, 280, 280);
        document.getElementById('currentScore').innerText = '0';
        document.getElementById('gradeText').innerText = '-';
    }

    function checkScore() {
        const userImg = ctx.getImageData(0, 0, 280, 280).data;
        const targetImg = tCtx.getImageData(0, 0, 280, 280).data;
        
        let match = 0, totalTarget = 0, penalty = 0;

        for (let i = 3; i < userImg.length; i += 4) {
            const userAlpha = userImg[i];
            const targetAlpha = targetImg[i];

            if (targetAlpha > 0) {
                totalTarget++;
                if (userAlpha > 0) match++;
            } else if (userAlpha > 0) {
                penalty++;
            }
        }

        let score = Math.round((match / totalTarget) * 100) - Math.round((penalty / totalTarget) * 20);
        score = Math.max(0, Math.min(100, score));

        document.getElementById('currentScore').innerText = score;
        
        let grade = "Coba Lagi!";
        if(score > 90) { grade = "SUGOI! 🔥"; saveProgress(); }
        else if(score > 70) { grade = "Bagus! 👍"; saveProgress(); }
        else if(score > 50) { grade = "Lumayan!"; }
        
        document.getElementById('gradeText').innerText = grade;
    }

    function saveProgress() {
        let count = parseInt(localStorage.getItem('hikari_mastered') || 0);
        count++;
        localStorage.setItem('hikari_mastered', count);
        loadProgress();
    }

    function loadProgress() {
        const count = localStorage.getItem('hikari_mastered') || 0;
        document.getElementById('totalProgress').innerText = `Mastered: ${count}`;
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        const isShow = m.style.display === 'flex';
        m.style.display = isShow ? 'none' : 'flex';
        if(!isShow && id === 'drawModal') setTimeout(initCanvas, 200);
    }

    // --- CHAT LOGIC (KONSISTEN) ---
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const load = document.getElementById('loading');
        if(!input.value.trim()) return;

        chat.innerHTML += `<div class="bubble user">${input.value}</div>`;
        load.style.display = 'flex';
        const msg = input.value;
        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            const ruby = data.reply.replace(/(\S+)\[([^\]]+)\]/g, '<ruby>$1<rt>$2</rt></ruby>');
            load.style.display = 'none';
            chat.innerHTML += `<div class="bubble sensei">${marked.parse(ruby)}</div>`;
        } catch (e) { load.style.display = 'none'; }
        chat.scrollTop = chat.scrollHeight;
    }

    // Sakura
    const s = document.getElementById('sakura');
    for(let i=0; i<15; i++) {
        const p = document.createElement('div'); p.className='petal';
        p.style.left=Math.random()*100+'vw'; p.style.width=p.style.height=Math.random()*8+6+'px';
        p.style.animationDuration=Math.random()*3+4+'s'; p.style.animationDelay=Math.random()*5+'s';
        s.appendChild(p);
    }
</script>

</body>
</html>
